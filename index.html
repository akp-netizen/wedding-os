<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley &amp; Aaron</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#211018; --night-2:#2C1622; --glow:#3A1E2C;
    --parchment:#F4EEE2; --card:#FBF8F1; --card-2:#F8F3E9;
    --ink:#2E2630; --soft:#6B6069; --line:#E5DBC9;
    --wine:#7B2233; --wine-deep:#5C1A2E; --plum:#4A2540;
    --rust:#B5723A; --brass:#C77D46;
    --sage:#7C8B6B; --sage-deep:#5F6E50; --sage-tint:#E8ECDF;
    --amber:#C79A4A; --amber-tint:#F1E4C6; --over-tint:#F3DED0;
    --cream:#EDE3D3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--parchment); color:var(--ink);
    font-family:'Jost',system-ui,-apple-system,sans-serif; font-size:16px; line-height:1.5;}
  button{font-family:inherit; cursor:pointer;}
  :focus-visible{outline:2px solid var(--wine); outline-offset:2px;}
  .tnum{font-variant-numeric:tabular-nums;}
  .hide{display:none !important;}

  /* ---------- sign-in ---------- */
  #signin{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 24px;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--glow) 0%, transparent 60%),
      radial-gradient(80% 60% at 50% 120%, #341826 0%, transparent 60%),
      var(--night);
    color:var(--cream); position:relative; overflow:hidden;}
  .flicker{position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(40% 30% at 50% 30%, rgba(199,125,70,.10), transparent 70%);
    animation:flick 6s ease-in-out infinite;}
  @keyframes flick{0%,100%{opacity:.7} 50%{opacity:1}}
  @media (prefers-reduced-motion: reduce){ .flicker{animation:none;} }
  .monogram{font-family:'Cormorant Garamond',serif; letter-spacing:1px; color:var(--cream);}
  .crest{width:132px;height:132px;margin:0 auto 10px; position:relative; z-index:1;}
  #signin .names{font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(40px,10vw,68px);
    line-height:1.02; z-index:1;}
  #signin .amp{font-style:italic; color:var(--brass);}
  #signin .tag{color:#C9B4B8; letter-spacing:.24em; text-transform:uppercase; font-size:12px; margin-top:14px; z-index:1;}
  .gbtn{margin-top:34px; z-index:1; display:inline-flex; align-items:center; gap:12px;
    background:var(--cream); color:var(--night); border:none; border-radius:999px;
    padding:14px 26px; font-weight:600; font-size:15px; box-shadow:0 10px 30px -12px rgba(0,0,0,.6);}
  .gbtn:hover{background:#fff;}
  .glogo{width:18px;height:18px;display:inline-block;}
  #signin .fine{margin-top:18px; font-size:12px; color:#9A868C; z-index:1;}

  /* ---------- app frame ---------- */
  #app{min-height:100vh; display:flex; flex-direction:column;}
  .topbar{background:var(--night); color:var(--cream); display:flex; align-items:center;
    gap:18px; padding:12px 20px; position:sticky; top:0; z-index:20;}
  .topbar .mark{font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; letter-spacing:1px; color:var(--cream);}
  .topbar .mark .amp{color:var(--brass); font-style:italic;}
  nav.views{display:flex; gap:4px; margin-left:6px; flex:1; overflow-x:auto;}
  nav.views button{background:transparent; border:none; color:#C9B4B8; padding:8px 12px; border-radius:8px;
    font-size:14px; letter-spacing:.02em; white-space:nowrap;}
  nav.views button:hover{color:var(--cream); background:rgba(255,255,255,.06);}
  nav.views button.active{color:var(--cream);}
  nav.views button.active{position:relative;}
  nav.views button.active::after{content:""; position:absolute; left:12px; right:12px; bottom:2px; height:2px;
    background:var(--brass); border-radius:2px;}
  .signout{background:transparent; border:1px solid rgba(255,255,255,.18); color:#C9B4B8;
    border-radius:999px; padding:7px 14px; font-size:13px;}
  .signout:hover{color:var(--cream); border-color:rgba(255,255,255,.4);}
  main{flex:1;}
  .view{max-width:1080px; margin:0 auto; padding:26px 20px 80px;}
  .view-enter{animation:fade .35s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion: reduce){ .view-enter{animation:none;} }

  /* ---------- home ---------- */
  .hero{margin:-26px -20px 0; padding:48px 24px 42px;
    background:
      radial-gradient(120% 100% at 50% -20%, var(--glow) 0%, transparent 60%),
      var(--night);
    color:var(--cream); text-align:center; position:relative; overflow:hidden;}
  .hero .crest{width:120px;height:120px;}
  .hero .names{font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(38px,8vw,62px); line-height:1.02;}
  .hero .amp{font-style:italic; color:var(--brass);}
  .countdown{margin-top:22px;}
  .countdown .num{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:clamp(54px,14vw,96px); line-height:.9; color:var(--cream);}
  .countdown .lbl{letter-spacing:.26em; text-transform:uppercase; font-size:12px; color:#C9B4B8; margin-top:8px;}
  .countdown .date{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:20px; color:var(--brass); margin-top:6px;}
  .setdate{margin-top:14px; background:transparent; border:1px solid rgba(255,255,255,.25); color:var(--cream);
    border-radius:999px; padding:10px 20px; font-size:14px;}
  .setdate:hover{border-color:var(--brass); color:var(--brass);}
  .hero-photo{margin:26px auto 0; max-width:520px; border-radius:14px; overflow:hidden;
    border:1px solid rgba(255,255,255,.14); position:relative; z-index:1;}
  .hero-photo img{width:100%; display:block;}
  .photo-empty{padding:34px; text-align:center; color:#B29AA0; font-size:14px;
    border:1px dashed rgba(255,255,255,.22); border-radius:14px; margin:26px auto 0; max-width:520px;}
  .photo-empty button{margin-top:10px; background:transparent; border:1px solid rgba(255,255,255,.25);
    color:var(--cream); border-radius:999px; padding:8px 16px; font-size:13px;}

  .pulse{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:26px;}
  @media (max-width:640px){ .pulse{grid-template-columns:1fr;} }
  .pcard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px;}
  .pcard .k{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--soft);}
  .pcard .v{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:30px; margin-top:4px; color:var(--wine);}
  .pcard .s{font-size:13px; color:var(--soft); margin-top:2px;}

  .moods{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px;}
  @media (max-width:640px){ .moods{grid-template-columns:1fr;} }
  .mood{border-radius:16px; padding:20px; color:var(--cream); min-height:120px; position:relative; overflow:hidden;}
  .mood.ashton{background:linear-gradient(150deg,#3A1622,#5C1A2E);}
  .mood.hoven{background:linear-gradient(150deg,#6E4A2C,#8A5A34);}
  .mood .evt{letter-spacing:.2em; text-transform:uppercase; font-size:11px; opacity:.85;}
  .mood .nm{font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600; margin-top:4px;}
  .mood .place{font-style:italic; font-family:'Cormorant Garamond',serif; opacity:.9; margin-top:2px;}
  .mood .rem{margin-top:12px; font-size:13px; opacity:.95;}

  /* ---------- section headers ---------- */
  .vhead{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:18px;}
  .vhead h2{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:34px; color:var(--wine); margin:0;}
  .vhead .sub{color:var(--soft); font-size:14px;}

  /* ---------- budget ---------- */
  .combined{display:flex; flex-wrap:wrap; gap:14px; margin-bottom:22px;}
  .combined .stat{flex:1 1 150px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .combined .lbl{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--soft);}
  .combined .val{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:28px; margin-top:2px;}
  .combined .hero .val{color:var(--wine);}

  .events{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  @media (max-width:820px){ .events{grid-template-columns:1fr;} }
  .event{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px;
    box-shadow:0 6px 22px -18px rgba(46,38,48,.5);}
  .event .en{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:24px; color:var(--plum);}
  .event .es{font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--soft); margin-bottom:14px;}
  .caps{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .capf{flex:1; min-width:96px;}
  .capf label{display:block; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--soft); margin-bottom:4px;}
  .capf .m{position:relative;}
  .capf .m::before{content:"$"; position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--soft); font-size:13px;}
  .capf input{width:100%; padding:8px 8px 8px 20px; border:1px solid var(--line); border-radius:8px; background:var(--card-2);
    font-family:'Jost'; font-size:14px; color:var(--ink);}
  .capf input:focus{outline:none; border-color:var(--wine); background:#fff;}

  .meter-top{display:flex; align-items:flex-end; justify-content:space-between; margin:6px 0 8px;}
  .remaining{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:32px; line-height:1;}
  .remaining small{display:block; font-family:'Jost'; font-weight:500; font-size:10px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--soft); margin-bottom:3px;}
  .pill{font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:5px 11px; border-radius:999px;}
  .z-calm{background:var(--sage-tint); color:var(--sage-deep);}
  .z-buffer{background:var(--amber-tint); color:#8a5a1c;}
  .z-over{background:var(--over-tint); color:var(--wine);}
  .z-empty{background:#EFE9DC; color:var(--soft);}
  .track{position:relative; height:18px; border-radius:6px; overflow:hidden; background:#EDE6D6; border:1px solid var(--line);}
  .zp{position:absolute; top:0; bottom:0; left:0; background:repeating-linear-gradient(45deg,var(--sage-tint),var(--sage-tint) 7px,#e2e7d6 7px,#e2e7d6 14px);}
  .zb{position:absolute; top:0; bottom:0; background:repeating-linear-gradient(45deg,var(--amber-tint),var(--amber-tint) 7px,#ecdcb6 7px,#ecdcb6 14px);}
  .fl{position:absolute; left:0; top:0; bottom:0; background:linear-gradient(var(--wine),var(--wine-deep)); transition:width .35s ease;}
  .fl.over{background:linear-gradient(var(--rust),#9C5E2C);}
  @media (prefers-reduced-motion: reduce){ .fl{transition:none;} }

  .cats{margin-top:16px;}
  .crow{display:grid; grid-template-columns:1.4fr .8fr .8fr .8fr auto; gap:8px; align-items:center; padding:8px 2px; border-bottom:1px solid #EFE9DC;}
  .crow input[type=text]{width:100%; border:none; background:transparent; font-family:'Jost'; font-size:14.5px; color:var(--ink); padding:3px 2px; border-bottom:1px solid transparent;}
  .crow input[type=text]:hover{border-bottom-color:var(--line);}
  .crow input[type=text]:focus{outline:none; border-bottom-color:var(--wine);}
  .crow .num{width:100%; border:1px solid transparent; background:#F6F1E6; border-radius:6px; font-family:'Jost'; font-size:13px; color:var(--ink); padding:5px 6px; text-align:right;}
  .crow .num:focus{outline:none; border-color:var(--wine); background:#fff;}
  .crow .tools{display:flex; align-items:center; gap:6px;}
  .flexbtn{font-size:10px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; border:1px solid var(--line);
    background:#F6F1E6; color:var(--soft); border-radius:999px; padding:4px 8px;}
  .flexbtn.flex{background:var(--sage-tint); color:var(--sage-deep); border-color:#cdd6bd;}
  .flexbtn.lock{background:#EEE6D8; color:var(--plum); border-color:#e0d5c2;}
  .del{border:none; background:transparent; color:var(--soft); font-size:16px; padding:2px 5px; border-radius:6px;}
  .del:hover{color:var(--wine); background:#F3E7E4;}
  .chead{display:grid; grid-template-columns:1.4fr .8fr .8fr .8fr auto; gap:8px; font-size:10px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--soft); padding:0 2px 6px; border-bottom:1px solid var(--line);}
  .chead .rt{text-align:right;}
  @media (max-width:560px){
    .chead{display:none;}
    .crow{grid-template-columns:1fr 1fr; border:1px solid #EFE9DC; border-radius:10px; padding:12px; margin-bottom:8px;}
    .crow .cn{grid-column:1/-1;}
    .crow .tools{grid-column:1/-1; justify-content:space-between;}
  }
  .addcat{margin-top:12px; width:100%; border:1px dashed var(--line); background:transparent; color:var(--wine);
    font-weight:600; font-size:13px; padding:9px 14px; border-radius:9px;}
  .addcat:hover{background:#F7EFE7; border-color:var(--wine);}
  .cat-empty{padding:18px 4px; color:var(--soft); font-size:14px; text-align:center;}
  .nudge{margin-top:14px; border:1px solid #e6c9a8; background:linear-gradient(#FBF1E2,#F7E9D6); border-radius:12px; padding:13px 15px;}
  .nudge .h{font-family:'Cormorant Garamond',serif; font-size:17px; color:#9C5E2C; margin-bottom:3px;}
  .nudge p{margin:0; font-size:13.5px; color:#6a5540;}

  /* ---------- guests ---------- */
  .hh-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  @media (max-width:860px){ .hh-grid{grid-template-columns:1fr;} }
  .hh{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px;
    box-shadow:0 6px 22px -18px rgba(46,38,48,.5);}
  .hh-top{display:flex; gap:12px; align-items:center;}
  .mono{flex:none; width:48px; height:48px; border-radius:50%;
    background:linear-gradient(150deg,var(--wine),var(--plum)); color:var(--cream);
    font-family:'Cormorant Garamond',serif; font-weight:600; font-size:18px; letter-spacing:.5px;
    display:flex; align-items:center; justify-content:center;}
  .hh-name{flex:1; min-width:0; border:none; background:transparent; font-family:'Cormorant Garamond',serif;
    font-weight:600; font-size:21px; color:var(--plum); padding:2px 0; border-bottom:1px solid transparent;}
  .hh-name:hover{border-bottom-color:var(--line);} .hh-name:focus{outline:none; border-bottom-color:var(--wine);}
  .hh-sec{margin-top:16px; padding-top:14px; border-top:1px solid #EFE9DC;}
  .hh-label{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); margin-bottom:8px;}
  .fld{width:100%; border:1px solid var(--line); background:var(--card-2); border-radius:8px; padding:8px 10px;
    font-family:'Jost'; font-size:14px; color:var(--ink); margin-bottom:8px;}
  .fld:focus{outline:none; border-color:var(--wine); background:#fff;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .row3{display:grid; grid-template-columns:2fr 1fr 1fr; gap:8px;}
  .row2 .fld,.row3 .fld{margin-bottom:0;}
  .mem-list{display:flex; flex-direction:column; gap:8px;}
  .mem-row{display:flex; gap:8px; align-items:center;}
  .mem-name{flex:1; min-width:0; border:1px solid var(--line); background:var(--card-2); border-radius:8px;
    padding:8px 10px; font-family:'Jost'; font-size:14px; color:var(--ink);}
  .mem-name:focus{outline:none; border-color:var(--wine); background:#fff;}
  .typebtn{flex:none; border:1px solid var(--line); border-radius:8px; padding:7px 12px; font-size:12px; font-weight:600;}
  .typebtn.adult{background:var(--sage-tint); color:var(--sage-deep); border-color:#cdd6bd;}
  .typebtn.child{background:var(--amber-tint); color:#8a5a1c; border-color:#e6d3a8;}
  .mem-empty{color:var(--soft); font-size:13px; font-style:italic;}
  .mini-add{margin-top:10px; border:1px dashed var(--line); background:transparent; color:var(--wine);
    font-weight:600; font-size:12.5px; padding:7px 12px; border-radius:8px;}
  .mini-add:hover{background:#F7EFE7; border-color:var(--wine);}
  .inv-row{display:flex; gap:8px; margin-bottom:8px;}
  .inv{flex:1; text-align:left; border:1px solid var(--line); background:#F6F1E6; color:var(--soft);
    border-radius:8px; padding:8px 10px; font-size:12.5px; font-weight:600; letter-spacing:.02em;}
  .inv.on{background:var(--sage-tint); color:var(--sage-deep); border-color:#cdd6bd;}
  .rsvpbtn{flex:none; width:108px; border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px;
    font-weight:600; text-transform:capitalize; background:#F1EADB; color:var(--soft);}
  .r-yes{background:var(--sage-tint); color:var(--sage-deep); border-color:#cdd6bd;}
  .r-no{background:#EEE1DA; color:#8a4a3a; border-color:#e0cabf;}
  .r-pending{background:#F1EADB; color:var(--soft);}
  .ty{border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:12.5px; font-weight:600;
    background:#F1EADB; color:var(--soft);}
  .ty.done{background:var(--sage-tint); color:var(--sage-deep); border-color:#cdd6bd;}
  .del{border:none; background:transparent; color:var(--soft); font-size:16px; padding:2px 5px; border-radius:6px;}
  .del:hover{color:var(--wine); background:#F3E7E4;}
  .hh-token{margin-top:14px; font-size:11px; color:var(--soft);}
  .hh-token code{background:#F1EADB; padding:1px 5px; border-radius:4px;}

  /* ---------- guide ---------- */
  .guide-head{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:22px;}
  .gh-top{display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:10px; flex-wrap:wrap;}
  .gh-count{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:24px; color:var(--wine);}
  .focus{font-size:13px; color:var(--soft); letter-spacing:.02em;}
  .pbar{height:8px; background:#EDE6D6; border-radius:999px; overflow:hidden;}
  .pfill{height:100%; background:linear-gradient(90deg,var(--sage),var(--sage-deep)); border-radius:999px; transition:width .4s ease;}
  @media (prefers-reduced-motion: reduce){ .pfill{transition:none;} }
  .phase{margin-bottom:26px;}
  .phase-head{display:flex; align-items:baseline; gap:10px; margin-bottom:10px;}
  .phase-head h3{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:23px; color:var(--plum); margin:0;}
  .phase-prog{font-size:12px; color:var(--soft); letter-spacing:.04em;}
  .tasks{display:flex; flex-direction:column; gap:8px;}
  .task{display:flex; gap:12px; align-items:flex-start; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px;}
  .task.done{opacity:.6;}
  .check{flex:none; width:22px; height:22px; border-radius:50%; border:2px solid var(--sage-deep); background:transparent; margin-top:2px; position:relative; cursor:pointer;}
  .check.on{background:var(--sage-deep);}
  .check.on::after{content:"✓"; color:#fff; font-size:13px; line-height:1; position:absolute; left:50%; top:50%; transform:translate(-50%,-55%);}
  .t-main{flex:1; min-width:0;}
  .t-title{width:100%; border:none; background:transparent; font-family:'Jost'; font-size:15px; color:var(--ink); padding:2px 0; border-bottom:1px solid transparent;}
  .t-title:hover{border-bottom-color:var(--line);} .t-title:focus{outline:none; border-bottom-color:var(--wine);}
  .task.done .t-title{text-decoration:line-through; color:var(--soft);}
  .t-meta{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; align-items:center;}
  .tag{font-size:10px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; padding:2px 8px; border-radius:999px; background:#F1EADB; color:var(--soft);}
  .tag.cat{background:#EFE7DC; color:var(--plum);}
  .ev-Ashton{background:#F0DCE2; color:var(--wine);}
  .ev-Hoven{background:var(--amber-tint); color:#8a5a1c;}
  .ev-both{background:var(--sage-tint); color:var(--sage-deep);}
  .due{font-size:10px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; padding:2px 8px; border-radius:999px; background:var(--sage-tint); color:var(--sage-deep);}
  .due.over{background:var(--over-tint); color:var(--wine);}
  .t-advice{font-size:12.5px; color:var(--soft); margin-top:6px; line-height:1.45;}
  .gbtn2{background:var(--wine); color:#fff; border:none; border-radius:999px; padding:11px 22px; font-weight:600; font-size:14px;}
  .gbtn2:hover{background:var(--wine-deep);}

  /* ---------- details ---------- */

/* ---------- budget math ---------- */
function lineCommitted(c){ return (c.actual!=="" && c.actual!=null) ? num(c.actual) : num(c.estimated); }
function computeEvent(ev){
  const cfg = state.config.events[ev] || {cap:0,buffer:0};
  const rows = state.budget.filter(r=>r.event===ev);
  let committed=0; rows.forEach(r=>committed+=lineCommitted(r));
  const cap=num(cfg.cap), buffer=num(cfg.buffer), target=cap-buffer;
  let zone = cap<=0?"empty" : committed>cap?"over" : committed>target?"buffer" : "calm";
  return {ev,cap,buffer,target,committed,remaining:cap-committed,zone,rows};
}
function suggestFor(ev){
  const e=computeEvent(ev);
  if(e.cap<=0 || e.committed<=e.cap) return null;
  const overage=e.committed-e.cap; const cands=[];
  e.rows.forEach(r=>{
    const flex=!!r.flexible; if(!flex) return;
    const spent=(r.actual!=="" && r.actual!=null); if(spent) return;
    const cuttable=Math.max(0,num(r.estimated)-num(r.deposit));
    if(cuttable>0) cands.push({name:r.category||"a line", cuttable});
  });
  const total=cands.reduce((s,x)=>s+x.cuttable,0);
  if(total<=0) return {text:"Over by "+money(overage)+" with nothing flexible left to trim. Raise the cap or unlock a line."};
  const target=Math.min(overage,total);
  const parts=cands.map(x=>({n:x.name,c:Math.round(target*(x.cuttable/total))})).filter(x=>x.c>0).map(x=>"trim "+x.n+" by "+money(x.c));
  const shortfall=Math.max(0,overage-target);
  let text="Over by "+money(overage)+". Try: "+parts.join(", ")+".";
  if(shortfall>0) text+=" Still "+money(shortfall)+" to find after that.";
  return {text};
}
function memberCount(g){ return Array.isArray(g.members)?g.members.length:0; }
function headcountFor(ev){
  const invitedKey = ev==="Ashton"?"invitedAshton":"invitedHoven";
  const rsvpKey    = ev==="Ashton"?"rsvpAshton":"rsvpHoven";
  let total=0;
  state.guests.forEach(g=>{
    if(!g[invitedKey]) return;
    if(String(g[rsvpKey]||"pending")!=="yes") return;
    total+=memberCount(g);
  });
  return total;
}

/* headcount -> food line, the live tie-in */
let foodSyncTimer=null;
function scheduleFoodSync(){ clearTimeout(foodSyncTimer); foodSyncTimer=setTimeout(applyHeadcountToFood,600); }
function applyHeadcountToFood(){
  if(!uid) return;
  EVENTS.forEach(ev=>{
    const cfg=state.config.events[ev]; if(!cfg) return;
    const perPlate=num(cfg.perPlate); if(perPlate<=0) return;
    const heads=headcountFor(ev); if(heads<=0) return; // never zero-out a set line
    const projected=Math.round(heads*perPlate);
    const foodCat=(cfg.foodCategory||"Food").trim().toLowerCase();
    const existing=state.budget.find(r=>r.event===ev && String(r.category).trim().toLowerCase()===foodCat);
    if(existing){
      if(num(existing.estimated)!==projected){ updateCategory(existing.id,{estimated:String(projected)}); }
    } else {
      addDoc(collection(db,"users",uid,"budget"),
        {event:ev, category:cfg.foodCategory||"Food", estimated:String(projected), actual:"", deposit:"", flexible:true, createdAt:serverTimestamp()});
    }
  });
}

function monogramFrom(name){
  const cleaned=String(name||"").replace(/\bthe\b/gi,"").replace(/\bfamily\b/gi,"").trim();
  const fl=s=>s?s.charAt(0).toUpperCase():"";
  const parts=cleaned.split(/\s*&\s*|\s+and\s+/i).map(s=>s.trim()).filter(Boolean);
  if(parts.length>=2) return fl(parts[0])+"&"+fl(parts[1]);
  const words=cleaned.split(/\s+/).filter(Boolean);
  return words.length?fl(words[words.length-1]):"";
}
function genToken(taken){
  const chars="abcdefghijkmnpqrstuvwxyz23456789";
  for(let a=0;a<50;a++){ let t=""; for(let i=0;i<7;i++) t+=chars.charAt(Math.floor(Math.random()*chars.length)); if(!taken[t]) return t; }
  return "t"+Date.now().toString(36);
}
function addHousehold(){
  const taken={}; state.guests.forEach(g=>{ if(g.token) taken[g.token]=true; });
  addDoc(collection(db,"users",uid,"guests"),{

    invitedAshton:true, invitedHoven:true,
    rsvpAshton:"pending", rsvpHoven:"pending",
    gift:"", thankYou:false,
    token:genToken(taken), createdAt:serverTimestamp()
  });
}

function removeHousehold(id){ deleteDoc(doc(db,"users",uid,"guests",id)); }
function mkId(){ return "m"+Math.random().toString(36).slice(2,7); }
function addMember(id){

function buildNav(){

function show(v){

    const e=computeEvent(ev); const cfg=state.config.events[ev];
    const scale=e.committed>e.cap?e.committed:e.cap;

    const bufW =scale>0?Math.max(0,Math.min(100-planW,e.buffer/scale*100)):0;
    const fillW=scale>0?Math.max(0,Math.min(100,e.committed/scale*100)):0;

    return `<div class="event" data-ev="${ev}">
      <div class="en">${esc(EVENT_LABEL[ev])}</div>
      <div class="es">${esc(EVENT_PLACE[ev])}</div>
      <div class="caps">
        <div class="capf"><label>Cap</label><div class="m"><input data-cf="cap" inputmode="decimal" value="${esc(cfg.cap||"")}" placeholder="0"></div></div>
        <div class="capf"><label>Buffer</label><div class="m"><input data-cf="buffer" inputmode="decimal" value="${esc(cfg.buffer||"")}" placeholder="0"></div></div>
        <div class="capf"><label>Per plate</label><div class="m"><input data-cf="perPlate" inputmode="decimal" value="${esc(cfg.perPlate||"")}" placeholder="0"></div></div>

/* ---------- GUIDE ---------- */
function taskDue(token){
  const wd=state.profile.weddingDate; if(!wd) return null;
  const m=String(token||"").match(/^-?(\d+)(yr|mo|wk|d)$/); if(!m) return null;
  const n=parseInt(m[1],10), unit=m[2];
  const d=new Date(wd);
  if(unit==="yr") d.setFullYear(d.getFullYear()-n);
  else if(unit==="mo") d.setMonth(d.getMonth()-n);
  else if(unit==="wk") d.setDate(d.getDate()-n*7);
  else d.setDate(d.getDate()-n);
  return d;
}
function dueLabel(token){
  const d=taskDue(token); if(!d) return "";
  const days=Math.ceil((d.getTime()-Date.now())/86400000);
  if(days<0) return "overdue";
  if(days===0) return "now";
  if(days<14) return "in "+days+" days";
  if(days<60) return "in "+Math.round(days/7)+" weeks";
  return "in "+Math.round(days/30)+" months";
}
function dynSuffix(t){
  if(t.dyn==="headcount"){ const h=headcountFor("Ashton")+headcountFor("Hoven"); return " Right now: "+h+" heads across both."; }
  if(t.dyn==="budget"){ let r=0; EVENTS.forEach(ev=>r+=computeEvent(ev).remaining); return " Right now: "+money(r)+" remaining."; }
  return "";
}

      <button class="mini-add" data-act="addtask" data-phase="${esc(phase)}">+ Add a step to ${esc(phase)}</button>
    </section>`;
  }).join("");
  return `<div class="view">
    <div class="vhead"><h2>Guide</h2><div class="sub">your wedding planner, phase by phase</div></div>
    ${header}${sections}
  </div>`;
}
function renderTaskRow(t){
  const done=t.status==="done";
  const evTag = t.event==="Ashton"?`<span class="tag ev-Ashton">Ashton</span>`
    : t.event==="Hoven"?`<span class="tag ev-Hoven">Hoven</span>`
    : t.event==="Both"?`<span class="tag ev-both">Both</span>`:``;
  const catTag = t.category?`<span class="tag cat">${esc(t.category)}</span>`:``;
  const dl = (state.profile.weddingDate && t.countdown)?dueLabel(t.countdown):``;
  const due = dl?`<span class="due ${dl==="overdue"?"over":""}">${esc(dl)}</span>`:``;
  const advice = t.advice?`<div class="t-advice">${esc(t.advice)}${esc(dynSuffix(t))}</div>`:``;
  return `<div class="task ${done?"done":""}" data-id="${t.id}">
    <button class="check ${done?"on":""}" data-act="toggle" aria-label="Toggle done"></button>
    <div class="t-main">
      <input type="text" class="t-title" data-f="title" value="${esc(t.title)}" placeholder="Step">
      <div class="t-meta">${due}${evTag}${catTag}</div>
      ${advice}
    </div>
    <button class="del" data-act="deltask" aria-label="Delete step">&times;</button>
  </div>`;
}
function wireGuide(){
  const root=$("#viewRoot");
  root.querySelectorAll("[data-act='seed']").forEach(b=>b.addEventListener("click",seedPlanner));
  root.querySelectorAll("[data-act='addtask']").forEach(b=>b.addEventListener("click",()=>addTask(b.dataset.phase)));
  root.querySelectorAll(".task").forEach(row=>{
    const id=row.dataset.id;
    row.querySelectorAll("[data-act='toggle']").forEach(b=>b.addEventListener("click",()=>{
      const t=state.tasks.find(x=>x.id===id); if(t) updateTask(id,{status:t.status==="done"?"todo":"done"});
    }));
    row.querySelectorAll("input[data-f='title']").forEach(inp=>inp.addEventListener("input",()=>{
      const t=state.tasks.find(x=>x.id===id); if(t) t.title=inp.value;
      debounceSave("task:"+id,()=>updateTask(id,{title:inp.value}));
    }));
    row.querySelectorAll("[data-act='deltask']").forEach(b=>b.addEventListener("click",()=>removeTask(id)));
  });
}

/* ---------- DETAILS ---------- */
const D_STATUS = ["Open","Decided","Booked"];
const D_EVENT = ["Both","Ashton","Hoven"];
function addDetail(){
  const maxOrder=state.details.reduce((m,d)=>Math.max(m,num(d.order)),0);
  addDoc(collection(db,"users",uid,"details"),{
    item:"", event:"Both", category:"", status:"Open",
    vendor:"", contact:"", cost:"", notes:"",
    publish:false, published:"", order:maxOrder+1, createdAt:serverTimestamp()
  });
}
function updateDetail(id,patch){ updateDoc(doc(db,"users",uid,"details",id), patch); }
function removeDetail(id){ deleteDoc(doc(db,"users",uid,"details",id)); }

function renderDetails(){
  if(state.details.length===0){
    return `<div class="view">
      <div class="vhead"><h2>Details</h2><div class="sub">every decision in one place</div></div>
      <div class="soon"><div class="em">Nothing tracked yet</div>
      <p>This is where every decision lives — florist, cake, rentals, music, whatever's on your mind. Mark each one Open, Decided, or Booked, and flag the ones guests should see for your future site.</p>
      <div style="margin-top:18px"><button class="gbtn2" data-act="adddetail">Add your first decision</button></div></div>
    </div>`;
  }
  const counts={Open:0,Decided:0,Booked:0};
  state.details.forEach(d=>{ const s=d.status||"Open"; if(counts[s]!=null) counts[s]++; });
  const summary=`<div class="combined">
    <div class="stat"><div class="lbl">Still open</div><div class="val tnum">${counts.Open}</div></div>
    <div class="stat"><div class="lbl">Decided</div><div class="val tnum">${counts.Decided}</div></div>
    <div class="stat hero"><div class="lbl">Booked</div><div class="val tnum">${counts.Booked}</div></div>
  </div>`;
  const groups=D_STATUS.map(status=>{
    const items=state.details.filter(d=>(d.status||"Open")===status);
    if(items.length===0) return "";
    return `<section class="phase">
      <div class="phase-head"><h3>${status}</h3><span class="phase-prog tnum">${items.length}</span></div>
      <div class="dcards">${items.map(renderDetailCard).join("")}</div>
    </section>`;
  }).join("");
  return `<div class="view">
    <div class="vhead"><h2>Details</h2><div class="sub">every decision in one place</div></div>
    ${summary}
    <button class="addcat" data-act="adddetail" style="max-width:260px;margin-bottom:18px">+ Add a decision</button>
    ${groups}
  </div>`;
}
function renderDetailCard(d){
  const st=d.status||"Open";
  const stc={Open:"st-open",Decided:"st-decided",Booked:"st-booked"}[st]||"st-open";
  const ev=d.event||"Both";
  const evc={Both:"ev-both",Ashton:"ev-Ashton",Hoven:"ev-Hoven"}[ev]||"ev-both";
  return `<div class="dcard" data-id="${d.id}">
    <div class="d-top">
      <input type="text" class="d-item" data-f="item" value="${esc(d.item)}" placeholder="What's the decision? (florist, cake, rentals...)">
      <button class="stpill ${stc}" data-act="status">${esc(st)}</button>
      <button class="del" data-act="deldetail" aria-label="Delete">&times;</button>
    </div>
    <div class="d-meta">
      <button class="evcyc ${evc}" data-act="event">${esc(ev)}</button>
      <input type="text" class="fld d-cat" data-f="category" value="${esc(d.category)}" placeholder="Category (florals, food, decor...)">
    </div>
    <div class="row2">
      <input type="text" class="fld" data-f="vendor" value="${esc(d.vendor)}" placeholder="Vendor / who">
      <input type="text" class="fld" data-f="contact" value="${esc(d.contact)}" placeholder="Contact">
    </div>
    <div class="row2">
      <input type="text" class="fld" data-f="cost" value="${esc(d.cost)}" placeholder="Est. cost (note)">
      <input type="text" class="fld" data-f="notes" value="${esc(d.notes)}" placeholder="Notes">
    </div>
    <div class="d-pub">
      <button class="pubtoggle ${d.publish?'on':''}" data-act="publish">${d.publish?'Shown to guests ✓':'Show on guest site'}</button>
      ${d.publish?`<input type="text" class="fld" data-f="published" value="${esc(d.published)}" placeholder="What guests see (time, address, etc.)">`:``}
    </div>
  </div>`;
}
function wireDetails(){
  const root=$("#viewRoot");
  root.querySelectorAll("[data-act='adddetail']").forEach(b=>b.addEventListener("click",addDetail));
  root.querySelectorAll(".dcard").forEach(card=>{
    const id=card.dataset.id;
    const d=()=>state.details.find(x=>x.id===id);
    card.querySelectorAll("input[data-f]").forEach(inp=>{
      inp.addEventListener("input",()=>{
        const f=inp.dataset.f; const dd=d(); if(dd) dd[f]=inp.value;
        debounceSave("det:"+id+":"+f,()=>updateDetail(id,{[f]:inp.value}));
      });
    });
    card.querySelectorAll("[data-act='status']").forEach(b=>b.addEventListener("click",()=>{
      const dd=d(); if(!dd) return;
      const i=D_STATUS.indexOf(dd.status||"Open");
      updateDetail(id,{status:D_STATUS[(i+1)%D_STATUS.length]});
    }));
    card.querySelectorAll("[data-act='event']").forEach(b=>b.addEventListener("click",()=>{
      const dd=d(); if(!dd) return;
      const i=D_EVENT.indexOf(dd.event||"Both");
      updateDetail(id,{event:D_EVENT[(i+1)%D_EVENT.length]});
    }));
    card.querySelectorAll("[data-act='publish']").forEach(b=>b.addEventListener("click",()=>{
      const dd=d(); if(dd) updateDetail(id,{publish:!dd.publish});
    }));
    card.querySelectorAll("[data-act='deldetail']").forEach(b=>b.addEventListener("click",()=>{
      if(confirm("Delete this decision?")) removeDetail(id);
    }));
  });
}

/* ---------- INVITES (public site + QR) ---------- */
function inviteBase(){
  const u=location.href.split('#')[0].split('?')[0];
  const dir=u.substring(0,u.lastIndexOf('/')+1);
  return dir+"invite.html";
}
function inviteLink(token){ return inviteBase()+"?t="+token; }
function publishedDetailsFor(ev){
  return state.details
    .filter(d=>d.publish && (d.event===ev || d.event==="Both") && (String(d.item).trim()||String(d.published).trim()))
    .map(d=>({item:String(d.item||""), value:String(d.published||"")}));
}
async function publishInvites(){
  const withTokens=state.guests.filter(g=>g.token);
  if(!withTokens.length){ toast("Add households first."); return; }
  const batch=writeBatch(db);
  withTokens.forEach(g=>{
    const events=[];
    EVENTS.forEach(ev=>{
      const inv= ev==="Ashton"?g.invitedAshton:g.invitedHoven;
      if(!inv) return;
      events.push({key:ev, label:EVENT_LABEL[ev], place:EVENT_PLACE[ev], details:publishedDetailsFor(ev)});
    });
    batch.set(doc(db,"invites",g.token),{
      ownerUid:uid,
      household:g.displayName||"",
      monogram:g.monogram||monogramFrom(g.displayName)||"",
      weddingDate:state.profile.weddingDate||"",
      events, updatedAt:serverTimestamp()
    });
  });
  try{ await batch.commit(); toast("Guest site published"); }
  catch(e){ toast("Publish failed — check your Firestore rules."); }
}
function drawQR(container, url, mono){
  container.innerHTML="";
  if(!window.QRCode){ container.textContent="QR unavailable"; return; }
  new QRCode(container, {text:url, width:200, height:200, colorDark:"#2E2630", colorLight:"#F7F2E8", correctLevel:QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const canvas=container.querySelector("canvas"); if(!canvas) return;
    const img=container.querySelector("img"); if(img) img.style.display="none";
    canvas.style.display="block";
    const ctx=canvas.getContext("2d"); const s=canvas.width; const r=s*0.17;
    ctx.beginPath(); ctx.arc(s/2,s/2,r+5,0,Math.PI*2); ctx.fillStyle="#F7F2E8"; ctx.fill();
    ctx.beginPath(); ctx.arc(s/2,s/2,r,0,Math.PI*2); ctx.fillStyle="#7B2233"; ctx.fill();
    ctx.fillStyle="#EDE3D3"; ctx.font="600 "+Math.round(r*1.05)+"px 'Cormorant Garamond', Georgia, serif";
    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(mono||"A&A", s/2, s/2+1);
  }, 80);
}
async function refreshRsvps(){
  let pulled=0;
  for(const g of state.guests){
    if(!g.token) continue;
    try{
      const snap=await getDoc(doc(db,"rsvps",g.token));
      if(!snap.exists()) continue;
      const data=snap.data(); const patch={};
      ["Ashton","Hoven"].forEach(ev=>{
        const r=data[ev]; if(!r||!r.response) return;
        const rk=ev==="Ashton"?"rsvpAshton":"rsvpHoven";
        patch[rk]= r.response==="yes"?"yes":"no";
      });
      if(Object.keys(patch).length){ updateHousehold(g.id, patch); pulled++; }
    }catch(e){}
  }
  toast(pulled?("Pulled "+pulled+" RSVP"+(pulled>1?"s":"")+" into your guest list"):"No new RSVPs yet");
}
function renderInvites(){
  const withTokens=state.guests.filter(g=>g.token);
  const top=`<div class="vhead"><h2>Invites</h2><div class="sub">publish the guest site, then share each household's code</div></div>`;
  if(!withTokens.length){
    return `<div class="view">${top}
      <div class="soon"><div class="em">Add households first</div>
      <p>Head to Guests and add the families you're inviting. Each one gets a private code and a bespoke QR here, ready to publish when you are.</p></div></div>`;
  }
  const actions=`<div class="inv-actions">
    <button class="gbtn2" data-act="publish">Publish / update guest site</button>
    <button class="addcat" style="max-width:200px;margin:0" data-act="refreshrsvp">Pull in RSVPs</button>
  </div>
  <p class="inv-note">Publishing writes each household a private page with only their invited events and the details you flagged "show on guest site." Re-publish whenever you change something.</p>`;
  const cards=withTokens.map(g=>{
    const mono=esc(g.monogram||monogramFrom(g.displayName)||"?");
    const evs=[];
    if(g.invitedAshton) evs.push(EVENT_LABEL.Ashton);
    if(g.invitedHoven) evs.push(EVENT_LABEL.Hoven);
    return `<div class="inv-card" data-token="${esc(g.token)}" data-mono="${mono}">
      <div class="qr" id="qr-${esc(g.token)}"></div>
      <div class="inv-main">
        <div class="inv-name">${esc(g.displayName||"Untitled household")}</div>
        <div class="inv-evs">${evs.length?evs.map(e=>esc(e)).join(" · "):"not invited to either event yet"}</div>
        <div class="inv-code">code <code>${esc(g.token)}</code></div>
        <div class="inv-btns">
          <button class="mini-add" style="margin:0" data-act="copylink">Copy link</button>
          <button class="mini-add" style="margin:0" data-act="downloadqr">Download QR</button>
        </div>
      </div>
    </div>`;
  }).join("");
  return `<div class="view">${top}${actions}<div class="inv-grid">${cards}</div></div>`;
}
function wireInvites(){
  const root=$("#viewRoot");
  root.querySelectorAll("[data-act='publish']").forEach(b=>b.addEventListener("click",publishInvites));
  root.querySelectorAll("[data-act='refreshrsvp']").forEach(b=>b.addEventListener("click",refreshRsvps));
  root.querySelectorAll(".inv-card").forEach(card=>{
    const token=card.dataset.token, mono=card.dataset.mono;
    const cont=card.querySelector(".qr");
    drawQR(cont, inviteLink(token), mono);
    card.querySelectorAll("[data-act='copylink']").forEach(b=>b.addEventListener("click",()=>{
      const link=inviteLink(token);
      if(navigator.clipboard){ navigator.clipboard.writeText(link).then(()=>toast("Link copied")); }
      else { prompt("Copy this link:", link); }
    }));
    card.querySelectorAll("[data-act='downloadqr']").forEach(b=>b.addEventListener("click",()=>{
      const canvas=cont.querySelector("canvas"); if(!canvas){ toast("QR still rendering, try again."); return; }
      const a=document.createElement("a");
      a.href=canvas.toDataURL("image/png"); a.download="qr-"+token+".png"; a.click();
    }));
  });
}

function renderSoon(v){
  const blurbs={
    Details:"Every decision in one place — what's locked, what's still open — with the guest-safe ones flagged for the future site."
  };
  return `<div class="view">
    <div class="vhead"><h2>${v}</h2><div class="sub">coming next</div></div>
    <div class="soon"><div class="em">${v} is on the way</div><p>${blurbs[v]}</p></div>
  </div>`;
}

/* ---------- wiring per view ---------- */
function wireCurrent(v){
  if(v==="Home") wireHome();
  if(v==="Budget") wireBudget();
  if(v==="Guests") wireGuests();
  if(v==="Guide") wireGuide();
  if(v==="Details") wireDetails();
  if(v==="Invites") wireInvites();
}
function wireHome(){
  const root=$("#viewRoot");
  root.querySelectorAll("[data-act='setdate']").forEach(b=>b.addEventListener("click",()=>{
    const cur=state.profile.weddingDate||"";
    const val=prompt("Wedding date as YYYY-MM-DD (leave blank to clear):", cur);
    if(val===null) return;
    const t=val.trim();
    if(t==="") { saveProfile({weddingDate:null}); toast("Date cleared"); return; }
    const d=new Date(t); if(isNaN(d.getTime())){ toast("Didn't read as a date. Try YYYY-MM-DD."); return; }
    saveProfile({weddingDate:t}); toast("Date set");
  }));
  const sp=root.querySelector("[data-act='setphoto']");
  if(sp) sp.addEventListener("click",()=>{
    const val=prompt("Paste a link to your photo (a hosted image URL):", state.profile.heroPhoto||"");
    if(val===null) return;
    saveProfile({heroPhoto:val.trim()||null});
  });
}
function wireBudget(){
  const root=$("#viewRoot");
  // config inputs
  root.querySelectorAll("[data-cf]").forEach(inp=>{
    inp.addEventListener("input",()=>{
      const ev=inp.closest(".event").dataset.ev;
      const f=inp.dataset.cf;
      state.config.events[ev][f]=inp.value;
      updateLive();
      debounceSave("cfg",()=>saveConfig());
    });
  });
  // category text/number inputs
  root.querySelectorAll(".crow [data-f]").forEach(inp=>{
    inp.addEventListener("input",()=>{
      const id=inp.closest(".crow").dataset.id;
      const f=inp.dataset.f;
      const row=state.budget.find(r=>r.id===id); if(row) row[f]=inp.value;
      updateLive();
      debounceSave("cat:"+id+":"+f,()=>updateCategory(id,{[f]:inp.value}));
    });
  });
  // buttons
  root.querySelectorAll("[data-act='addcat']").forEach(b=>b.addEventListener("click",()=>{
    addCategory(b.closest(".event").dataset.ev);
  }));
  root.querySelectorAll("[data-act='del']").forEach(b=>b.addEventListener("click",()=>{
    removeCategory(b.closest(".crow").dataset.id);
  }));
  root.querySelectorAll("[data-act='flex']").forEach(b=>b.addEventListener("click",()=>{
    const id=b.closest(".crow").dataset.id;
    const row=state.budget.find(r=>r.id===id); if(row) updateCategory(id,{flexible:!row.flexible});
  }));
}
</script>
